<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pulse</title>
	<link rel="stylesheet" href="css/bootstrap-reboot.min.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@300;400;500;700&family=Roboto&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="css/main.min.css">
</head>
<body>
	<div class="promo">
		<div class="container">
			<header class="header">
				<a class="header__logo" href="#">
					<img src="img/First-screen/Icons/logo.png" alt="logo">
				</a>
				<div class="header__official">
					Официальный представитель
					<span>Garmin, Polar, Suunto</span>
				</div>
				<div class="header__contacts">
					<a class="header__phone" href="tel:+74999228974">+7 (499) 922-89-74</a>
					<button class="button">заказать звонок</button>
				</div>
			</header>
			<div class="promo__wrapper">
				<h1 class="promo__header">Подбор пульсометра</h1>
				<h2 class="promo__subheader">с учётом Вашего уровня подготовки</h2>
				<div class="promo__icons">
					<div class="promo__icon">
						<img src="img/First-screen/Icons/timer.png" alt="timer">
						Время подбора: 10 минут
					</div>
					<div class="promo__icon">
						<img src="img/First-screen/Icons/hand-cart.png" alt="hand-cart">
						Бесплатная доставка
					</div>
					<div class="promo__icon">
						<img src="img/First-screen/Icons/messages.png" alt="messages">
						Ответим на все вопросы
					</div>
				</div>
				<button class="button button_main">заказать кОНСУЛЬТАЦИЮ</button>
				<div class="promo__link">
					или <a href="">ПЕРЕЙТИ В КАТАЛОГ</a>
				</div>
			</div>
			
		</div>
	</div>



</body>
</html>
